<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dance Calendar</title>

  <link rel="icon" href="master_icon.jpg">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dance Studio Schedule</h1>

<button id="addLessonBtn" class="fab">+</button>

<div id="calendar"></div>

<!-- Modal -->
<div id="lessonModal" class="modal hidden">
  <div class="modal-content">
    <h3>Lesson</h3>

    <label>Title</label>
    <input type="text" id="lessonTitle">

    <label>Date</label>
    <input type="date" id="lessonDate">

    <label>Time</label>
    <input type="time" id="lessonTime">

    <label>Lesson Type</label>
    <select id="lessonType">
      <option value="class">Class (45 min)</option>
      <option value="group">Group (60 min)</option>
    </select>

    <label>Coach</label>
    <select id="coachSelect" multiple>
      <option value="Vlad">Vlad</option>
      <option value="Anna">Anna</option>
      <option value="Kate">Kate</option>
    </select>

    <div class="modal-buttons">
      <button id="saveLesson">Save</button>
      <button id="deleteLesson" class="delete-btn hidden">Delete</button>
      <button id="cancelLesson">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
