<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dance Lessons Calendar</title>
  <link rel="icon" href="master_icon.jpg">

  <!-- FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@6.1.11/index.global.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dance Lessons Calendar</h1>

<div id="calendar"></div>

<!-- MODAL -->
<div id="lessonModal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Add lesson</h2>

    <label>
      Lesson name
      <input id="lessonTitle" type="text">
    </label>

    <label>
      Coaches (group allowed)
      <select id="lessonCoach" multiple>
        <option>Vlad</option>
        <option>Ana</option>
        <option>Petar Boss</option>
      </select>
    </label>

    <label>
      Date
      <input type="date" id="lessonDate">
    </label>

    <label>
      Start time
      <input type="time" id="lessonTime" value="09:00">
    </label>

    <div class="modal-buttons">
      <button id="saveLesson">Save</button>
      <button id="deleteLesson" class="danger hidden">Delete</button>
      <button id="cancelLesson" class="secondary">Cancel</button>
    </div>
  </div>
</div>

<!-- Floating button -->
<button id="addLessonBtn" class="floating-btn">+</button>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.11/index.global.min.js"></script>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
