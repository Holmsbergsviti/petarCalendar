<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dance Schedule</title>

  <link rel="icon" href="master_icon.jpg">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- App -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="calendar"></div>

  <!-- Modal -->
  <div id="lessonModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Lesson</h3>

      <label>Title</label>
      <input id="lessonTitle" placeholder="Lesson name">

      <label>Coaches</label>
      <select id="lessonCoach" multiple>
        <option>Vlad</option>
        <option>Anna</option>
        <option>Mark</option>
      </select>

      <label>Start</label>
      <input id="lessonStart" type="datetime-local">

      <label>End</label>
      <input id="lessonEnd" type="datetime-local">

      <div class="modal-actions">
        <button id="saveLesson">Save</button>
        <button id="deleteLesson" class="danger">Delete</button>
        <button id="closeModal">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
