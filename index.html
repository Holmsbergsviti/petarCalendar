<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dance Lessons Calendar</title>

  <!-- FullCalendar -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@6.1.11/index.global.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dance Lessons Calendar</h1>

<div id="calendar"></div>

<!-- Modal -->
<div id="lessonModal" class="modal hidden">
  <div class="modal-content">
    <h2>Add lesson</h2>

    <label>
      Lesson name
      <input id="lessonTitle" type="text" placeholder="Cas sa...">
    </label>

    <label>
      Coach
      <select id="lessonCoach">
        <option>Vlad</option>
        <option>Ana</option>
        <option>Petar Boss</option>
      </select>
    </label>

    <div class="modal-buttons">
      <button id="saveLesson">Save</button>
      <button id="cancelLesson" class="secondary">Cancel</button>
    </div>
  </div>
</div>

<!-- FullCalendar JS (GLOBAL BUILD ONLY) -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction@6.1.11/index.global.min.js"></script>

<!-- App -->
<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
