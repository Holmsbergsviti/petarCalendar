<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dance Lessons Calendar</title>
  <link rel="icon" type="image/x-icon" href="master_icon.jpg">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dance Lessons Calendar</h1>

<div class="toolbar">
  <div id="coachLegend" class="coach-legend"></div>
  <div id="filterControls" class="filter-controls">
    <label class="filter-label">Filter:</label>
    <select id="coachFilter" class="filter-select">
      <option value="">All Coaches</option>
      <option value="Vlad">Vlad</option>
      <option value="Ana">Ana</option>
      <option value="Petar Boss">Petar Boss</option>
    </select>
    <select id="typeFilter" class="filter-select">
      <option value="">All Types</option>
      <option value="class">Class</option>
      <option value="group">Group</option>
    </select>
  </div>
</div>

<div id="calendar"></div>

<!-- Modal -->
<div id="lessonModal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Add lesson</h2>

    <label>
      Lesson name
      <input id="lessonTitle" type="text">
    </label>

    <label>
      Coaches
      <select id="lessonCoach" multiple>
        <option>Vlad</option>
        <option>Ana</option>
        <option>Petar Boss</option>
      </select>
    </label>
    <label>
      Lesson type
      <select id="lessonType">
        <option value="class">Class (45 min)</option>
        <option value="group">Group (60 min)</option>
      </select>
    </label>

    <label>
      Date
      <input type="date" id="lessonDate">
    </label>

    <label>
      Start time
      <input type="time" id="lessonTime">
    </label>

    <label class="checkbox-label">
      <input type="checkbox" id="repeatWeekly">
      Repeat every week
    </label>

    <label id="repeatEndDateLabel" class="hidden">
      Repeat until (optional)
      <input type="date" id="repeatEndDate">
    </label>

    <div id="bulkEditOptions" class="bulk-edit-panel hidden">
      <p>Edit all future occurrences:</p>
      <button type="button" id="editAllFutureBtn" class="accent">Edit All Future</button>
    </div>
    
    <div class="modal-buttons">
      <button id="saveLesson">Save</button>
      <button id="deleteLesson" class="danger hidden">Delete</button>
      <button id="cancelLesson" class="secondary">Cancel</button>
    </div>
  </div>
</div>

<div id="timeConflictWarning" class="time-conflict-warning hidden">
  <strong>⚠️ Time Conflict</strong>
  <p id="conflictMessage"></p>
</div>

<button id="addLessonBtn" class="floating-btn">+</button>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
